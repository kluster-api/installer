apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "azure-credential-manager.fullname" . }}:leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "azure-credential-manager.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "azure-credential-manager.fullname" . }}:manager
  labels:
    {{- include "azure-credential-manager.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - serviceaccounts/finalizers
  verbs:
  - update
- apiGroups:
  - ""
  resources:
  - serviceaccounts/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
    - "rbac.authorization.k8s.io"
  resources:
    - clusterroles
    - clusterrolebindings
  verbs:
    - get
    - list
    - watch
    - update
    - patch
    - delete
    - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "azure-credential-manager.fullname" . }}:leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "azure-credential-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "azure-credential-manager.fullname" . }}:leader-election
subjects:
- kind: ServiceAccount
  name: {{ include "azure-credential-manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "azure-credential-manager.fullname" . }}:manager
  labels:
    {{- include "azure-credential-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "azure-credential-manager.fullname" . }}:manager
subjects:
- kind: ServiceAccount
  name: {{ include "azure-credential-manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "azure-credential-manager.fullname" . }}:metrics-auth
  labels:
    {{- include "azure-credential-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: {{ include "azure-credential-manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
{{- if ne .Values.azure.clientId "" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: use-mi-{{.Values.azure.clientId}}
  labels:
      {{- include "azure-credential-manager.labels" . | nindent 4 }}
rules:
  - verbs : ["use-managed-identity"]
    apiGroups: ["cid.wi.aks.azure.com"]
    resources: [{{.Values.azure.clientId}}]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: use-mi-{{.Values.azure.clientId}}
  labels:
      {{- include "azure-credential-manager.labels" . | nindent 4 }}
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: use-mi-{{.Values.azure.clientId}}
subjects:
  - kind: ServiceAccount
    name: {{ include "azure-credential-manager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}