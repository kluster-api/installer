{{- if eq .Values.monitoring.agent "prometheus.io/operator" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "azure-credential-manager.fullname" . }}-metrics-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "azure-credential-manager.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/service-account.name: {{ include "azure-credential-manager.serviceAccountName" . }}
type: kubernetes.io/service-account-token
{{- end }}
